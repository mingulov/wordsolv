name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck --workspaces --if-present
      # Fast suites only. solver-core's `npm test` also chains the seeded
      # benchmark simulations (~10 min); semantic-core's benchmark lives in a
      # separate config and self-skips when the vector asset is absent.
      - run: npx vitest run
        working-directory: packages/solver-core
      - run: npx vitest run
        working-directory: packages/semantic-core
      - run: npm test -w @wordsolv/web
      - run: npm run build -w @wordsolv/web
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
